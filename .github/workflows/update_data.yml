name: Monthly Data Update

on:
  schedule:
    # Runs at 00:00 UTC on the 1st day of every month
    - cron: '0 0 1 * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml simplekml

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if there are any changes to commit
        if [[ -n $(git status --porcelain) ]]; then
          git add data/ data.json
          git commit -m "Automated data update from WDFW on $(date +'%Y-%m-%d')"
          git push
        else
          echo "No changes detected in data. Skipping commit."
        fi